name: Deploy Client via Git

on:
  push:
    branches:
      - main  # deploy only on main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via Git
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash -c '
            TARGET_DIR=${{ secrets.DEPLOY_PATH }}
            mkdir -p $(dirname "$TARGET_DIR")
            if [ -d "$TARGET_DIR/.git" ]; then
              echo "Pulling latest changes..."
              cd $TARGET_DIR && git fetch --all && git reset --hard origin/main
            else
              echo "Cloning repo..."
              git clone https://github.com/mppnet/frontend.git $TARGET_DIR
            fi
          '
